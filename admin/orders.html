<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Silk Sutra Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 10px 15px; display: block; border-radius: 5px; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background-color: #007bff; color: #fff; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar p-3" style="width:250px;">
        <div class="text-center mb-4">
            <i class="fas fa-dharmachakra fa-2x text-warning mb-2"></i>
            <h5 class="fw-bold mb-0" id="sidebarStoreName">Silk Sutra Admin</h5>
        </div>
        <a href="index.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box me-2"></i> Products</a>
        <a href="orders.html" class="active"><i class="fas fa-shopping-cart me-2"></i> Orders <span class="badge bg-danger ms-2" id="navOrderCount">0</span></a>
        <a href="customers.html"><i class="fas fa-users me-2"></i> Customers</a>
        <a href="settings.html"><i class="fas fa-cog me-2"></i> Settings</a>
        <hr class="border-secondary my-4">
        <a href="../index.html"><i class="fas fa-store me-2"></i> View Store</a>
        <a href="../account/login.html" onclick="localStorage.removeItem('ss_currentUser')"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1">
        <nav class="navbar navbar-expand bg-white shadow-sm px-4 py-3 mb-4">
            <h5 class="fw-bold mb-0">Orders Management</h5>
            <div class="ms-auto d-flex align-items-center gap-3">
                <select class="form-select form-select-sm" id="filterStatus" onchange="loadOrders()" style="width:150px;">
                    <option value="All">All Statuses</option>
                    <option value="Processing">Processing</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Delivered">Delivered</option>
                    <option value="Refunded">Refunded</option>
                </select>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between">
                    <h5 class="mb-0 fw-bold">All Orders</h5>
                    <span class="text-muted small align-self-center" id="totalOrderCount">0 orders</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="allOrdersTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Order ID</th>
                                    <th>Date</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Order Details Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold">Order: <span id="modalOrderId" class="text-primary"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row mb-4">
                    <div class="col-sm-6">
                        <h6 class="text-muted text-uppercase small fw-bold mb-2">Customer Info</h6>
                        <h6 class="fw-bold mb-1" id="mCustomerName"></h6>
                        <p class="text-muted small mb-0"><i class="fas fa-envelope me-2"></i><span id="mContact"></span></p>
                    </div>
                    <div class="col-sm-6">
                        <h6 class="text-muted text-uppercase small fw-bold mb-2">Shipping Address</h6>
                        <p class="text-muted small mb-0"><i class="fas fa-map-marker-alt me-2"></i><span id="mAddress"></span></p>
                    </div>
                </div>
                <h6 class="text-muted text-uppercase small fw-bold mb-3 border-bottom pb-2">Items Ordered</h6>
                <div id="mItemsList" class="mb-3"></div>
                <div class="text-end border-top pt-3">
                    <h5 class="fw-bold">Total: <span id="mTotal" class="text-primary"></span></h5>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/db.js"></script>
<script>
    let orderModal;
    document.addEventListener('DOMContentLoaded', () => {
        orderModal = new bootstrap.Modal(document.getElementById('orderModal'));
        const s = DB.getSettings();
        document.getElementById('sidebarStoreName').textContent = s.storeName + ' Admin';
        document.getElementById('navOrderCount').textContent = DB.getOrders().filter(o => o.status === 'Processing').length;
        loadOrders();
    });

    function loadOrders() {
        let orders = DB.getOrders();
        const filter = document.getElementById('filterStatus').value;
        if (filter !== 'All') orders = orders.filter(o => o.status === filter);
        orders.sort((a, b) => new Date(b.date) - new Date(a.date));

        document.getElementById('totalOrderCount').textContent = `${orders.length} orders`;

        let html = '';
        orders.forEach(o => {
            let bc = 'bg-secondary';
            if (o.status === 'Processing') bc = 'bg-warning text-dark';
            else if (o.status === 'Shipped')    bc = 'bg-primary';
            else if (o.status === 'Delivered')  bc = 'bg-success';
            else if (o.status === 'Refunded')   bc = 'bg-danger';

            const dt = new Date(o.date).toLocaleDateString('en-IN', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
            const itemCount = o.items ? o.items.reduce((s,i) => s + i.qty, 0) : 0;

            html += `
            <tr>
                <td class="ps-4 fw-bold text-primary">${o.id}</td>
                <td class="text-muted small">${dt}</td>
                <td class="fw-bold">${o.customerName}</td>
                <td>${itemCount} item${itemCount !== 1 ? 's' : ''}</td>
                <td class="fw-bold">₹${o.total.toLocaleString()}</td>
                <td><span class="badge ${bc}">${o.status}</span></td>
                <td>
                    <div class="d-flex gap-2">
                        <select class="form-select form-select-sm" onchange="updateStatus('${o.id}', this.value)" style="width:130px;">
                            <option value="Processing" ${o.status==='Processing'?'selected':''}>Processing</option>
                            <option value="Shipped"    ${o.status==='Shipped'?'selected':''}>Shipped</option>
                            <option value="Delivered"  ${o.status==='Delivered'?'selected':''}>Delivered</option>
                            <option value="Refunded"   ${o.status==='Refunded'?'selected':''}>Refunded</option>
                        </select>
                        <button class="btn btn-sm btn-outline-primary" onclick="viewOrder('${o.id}')" title="View Details"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder('${o.id}')" title="Delete Order"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </td>
            </tr>`;
        });

        document.querySelector('#allOrdersTable tbody').innerHTML = html || `<tr><td colspan="7" class="text-center py-5 text-muted">No orders found.</td></tr>`;
    }

    function viewOrder(id) {
        const o = DB.getOrders().find(x => x.id === id);
        if (!o) return;
        document.getElementById('modalOrderId').textContent  = o.id;
        document.getElementById('mCustomerName').textContent = o.customerName;
        document.getElementById('mContact').textContent      = o.contact  || 'No contact provided';
        document.getElementById('mAddress').textContent      = o.address  || 'No address provided';
        document.getElementById('mTotal').textContent        = '₹' + o.total.toLocaleString();

        let itemsHtml = '';
        (o.items || []).forEach(item => {
            const img  = item.img  || 'https://via.placeholder.com/50';
            const name = item.name || ('Product #' + item.productId);
            itemsHtml += `
            <div class="d-flex align-items-center mb-3">
                <img src="${img}" class="rounded border me-3" style="width:50px;height:50px;object-fit:cover;">
                <div class="flex-grow-1">
                    <h6 class="mb-0 fw-bold">${name}</h6>
                    <small class="text-muted">Qty: ${item.qty} × ₹${item.price.toLocaleString()}</small>
                </div>
                <div class="fw-bold text-dark">₹${(item.qty * item.price).toLocaleString()}</div>
            </div>`;
        });
        document.getElementById('mItemsList').innerHTML = itemsHtml || '<p class="text-muted">No item data.</p>';
        orderModal.show();
    }

    function deleteOrder(id) {
        if (confirm(`Delete order ${id}? This cannot be undone.`)) {
            DB.deleteOrder(id);
            loadOrders();
            document.getElementById('navOrderCount').textContent = DB.getOrders().filter(o => o.status === 'Processing').length;
        }
    }

    function updateStatus(id, status) {
        DB.updateOrderStatus(id, status);
        loadOrders();
        document.getElementById('navOrderCount').textContent = DB.getOrders().filter(o => o.status === 'Processing').length;
    }
</script>
</body>
</html>
