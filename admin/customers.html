<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Silk Sutra Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 10px 15px; display: block; border-radius: 5px; margin-bottom: 5px; }
        .sidebar a:hover, .sidebar a.active { background-color: #007bff; color: #fff; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar p-3" style="width:250px;">
        <div class="text-center mb-4">
            <i class="fas fa-dharmachakra fa-2x text-warning mb-2"></i>
            <h5 class="fw-bold mb-0" id="sidebarStoreName">Silk Sutra Admin</h5>
        </div>
        <a href="index.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box me-2"></i> Products</a>
        <a href="orders.html"><i class="fas fa-shopping-cart me-2"></i> Orders <span class="badge bg-danger ms-2" id="navOrderCount">0</span></a>
        <a href="customers.html" class="active"><i class="fas fa-users me-2"></i> Customers</a>
        <a href="settings.html"><i class="fas fa-cog me-2"></i> Settings</a>
        <hr class="border-secondary my-4">
        <a href="../index.html"><i class="fas fa-store me-2"></i> View Store</a>
        <a href="../account/login.html" onclick="localStorage.removeItem('ss_currentUser')"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="flex-grow-1">
        <nav class="navbar navbar-expand bg-white shadow-sm px-4 py-3 mb-4">
            <h5 class="fw-bold mb-0">Customer Management</h5>
            <div class="ms-auto">
                <span class="text-muted small" id="totalCustomersLabel">0 users</span>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="customersTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Orders</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Customer Detail Modal -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold">Customer Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="text-center mb-4">
                    <div class="avatar bg-primary text-white mx-auto mb-3" style="width:70px;height:70px;font-size:2rem;"><span id="mInitial">?</span></div>
                    <h4 class="fw-bold mb-1" id="mName">-</h4>
                    <p class="text-muted mb-0" id="mEmail">-</p>
                    <span class="badge mt-2" id="mRoleBadge">-</span>
                </div>
                <hr>
                <div class="row text-center">
                    <div class="col-6">
                        <h4 class="fw-bold text-primary mb-0" id="mOrderCount">0</h4>
                        <small class="text-muted">Total Orders</small>
                    </div>
                    <div class="col-6">
                        <h4 class="fw-bold text-success mb-0" id="mTotalSpent">₹0</h4>
                        <small class="text-muted">Total Spent</small>
                    </div>
                </div>
                <hr>
                <h6 class="fw-bold mb-3">Recent Orders</h6>
                <div id="mRecentOrders" class="text-muted small"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/db.js"></script>
<script>
    let custModal;
    document.addEventListener('DOMContentLoaded', () => {
        custModal = new bootstrap.Modal(document.getElementById('customerModal'));
        const s = DB.getSettings();
        document.getElementById('sidebarStoreName').textContent = s.storeName + ' Admin';
        document.getElementById('navOrderCount').textContent = DB.getOrders().filter(o => o.status === 'Processing').length;
        loadCustomers();
    });

    function loadCustomers() {
        const users  = DB.getUsers();
        const orders = DB.getOrders();

        document.getElementById('totalCustomersLabel').textContent = `${users.length} users`;

        let html = '';
        users.forEach(u => {
            const initial = u.name.charAt(0).toUpperCase();
            const roleClass = u.role === 'admin' ? 'bg-danger' : 'bg-primary';
            const roleLabel = u.role === 'admin' ? 'Admin' : 'Customer';

            // Count orders for this user by email
            const userOrders = orders.filter(o => o.contact && o.contact.toLowerCase() === u.email.toLowerCase());
            const totalSpent = userOrders.reduce((s, o) => s + (o.total || 0), 0);

            html += `
            <tr>
                <td class="ps-4">
                    <div class="d-flex align-items-center">
                        <div class="avatar bg-primary bg-opacity-15 text-primary me-3">${initial}</div>
                        <span class="fw-bold">${u.name}</span>
                    </div>
                </td>
                <td class="text-muted">${u.email}</td>
                <td><span class="badge ${roleClass}">${roleLabel}</span></td>
                <td>${userOrders.length} orders <small class="text-muted">(₹${totalSpent.toLocaleString()})</small></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="viewCustomer('${u.id}')">
                        <i class="fas fa-eye me-1"></i>View
                    </button>
                </td>
            </tr>`;
        });

        document.querySelector('#customersTable tbody').innerHTML = html || `<tr><td colspan="5" class="text-center py-5 text-muted">No users found.</td></tr>`;
    }

    function viewCustomer(id) {
        const user   = DB.getUsers().find(u => u.id === id);
        const orders = DB.getOrders();
        if (!user) return;

        const userOrders = orders.filter(o => o.contact && o.contact.toLowerCase() === user.email.toLowerCase());
        const totalSpent = userOrders.reduce((s, o) => s + (o.total || 0), 0);

        document.getElementById('mInitial').textContent   = user.name.charAt(0).toUpperCase();
        document.getElementById('mName').textContent      = user.name;
        document.getElementById('mEmail').textContent     = user.email;
        document.getElementById('mRoleBadge').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
        document.getElementById('mRoleBadge').className   = `badge ${user.role === 'admin' ? 'bg-danger' : 'bg-primary'}`;
        document.getElementById('mOrderCount').textContent = userOrders.length;
        document.getElementById('mTotalSpent').textContent = '₹' + totalSpent.toLocaleString();

        let ordersHtml = '';
        userOrders.slice(-3).reverse().forEach(o => {
            ordersHtml += `<div class="d-flex justify-content-between mb-2">
                <span class="fw-bold text-primary">${o.id}</span>
                <span class="badge bg-light text-dark border">${o.status}</span>
                <span>₹${o.total.toLocaleString()}</span>
            </div>`;
        });
        document.getElementById('mRecentOrders').innerHTML = ordersHtml || '<p class="text-muted">No orders placed yet.</p>';

        custModal.show();
    }
</script>
</body>
</html>
