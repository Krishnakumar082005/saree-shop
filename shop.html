<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Silk Sutra</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-pill { cursor:pointer; padding:6px 18px; border-radius:25px; border:2px solid #dee2e6; background:#fff; font-weight:500; transition:all 0.2s; }
        .filter-pill.active, .filter-pill:hover { background:#800000; color:#fff; border-color:#800000; }
        .product-card-shop { border:none; border-radius:14px; overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,0.08); transition:transform 0.25s; }
        .product-card-shop:hover { transform:translateY(-5px); }
        .product-card-shop img { height:300px; object-fit:cover; width:100%; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar py-2">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span><i class="fas fa-shipping-fast me-2"></i>Free Shipping above ₹500 | COD Available</span>
            <div>
                <a href="account/login.html" class="me-3">Login / Register</a>
                <a href="order-tracking.html"><i class="fas fa-truck"></i> Track Order</a>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top py-3 shadow-sm bg-white">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-dharmachakra text-secondary me-2"></i> <span class="store-name">Silk Sutra</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 fw-bold me-4">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 fs-5">
                    <a href="account/index.html" class="text-primary" title="Account"><i class="far fa-user"></i></a>
                    <a href="cart.html" class="text-primary position-relative" title="Cart">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-accent cart-count" style="font-size:0.6rem;">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="bg-primary text-center py-4">
        <h1 class="text-secondary fw-bold font-heading mb-1">Saree Collection</h1>
        <p class="text-white opacity-75 mb-0">Handcrafted sarees from artisans across India</p>
    </div>

    <!-- Shop Content -->
    <div class="container py-5">
        <!-- Category filters (single row of pills) -->
        <div class="d-flex flex-wrap gap-2 justify-content-center mb-5" id="categoryFilters">
            <button class="filter-pill active" data-cat="all" onclick="applyFilter(this,'all')">All</button>
            <button class="filter-pill" data-cat="silk" onclick="applyFilter(this,'silk')">Silk</button>
            <button class="filter-pill" data-cat="cotton" onclick="applyFilter(this,'cotton')">Cotton</button>
            <button class="filter-pill" data-cat="bridal" onclick="applyFilter(this,'bridal')">Bridal</button>
            <button class="filter-pill" data-cat="party" onclick="applyFilter(this,'party')">Party Wear</button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <p class="mb-0 text-muted"><span id="productCount">0</span> products found</p>
        </div>

        <div class="row g-4" id="productGrid">
            <div class="col-12 text-center py-5">
                <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-4 bg-dark text-white">
        <div class="container text-center">
            <p class="mb-0 text-white-50">&copy; 2026 <span class="store-name">Silk Sutra</span>. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
        let allProducts = [];

        document.addEventListener('DOMContentLoaded', () => {
            allProducts = DB.getProducts();

            // Build dynamic category filter pills from actual product categories
            const categories = [...new Set(allProducts.map(p => p.category))];
            const knownCats = ['silk','cotton','bridal','party'];
            const extraCats = categories.filter(c => !knownCats.includes(c));
            const filtersDiv = document.getElementById('categoryFilters');
            extraCats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-pill';
                btn.dataset.cat = cat;
                btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.onclick = function() { applyFilter(this, cat); };
                filtersDiv.appendChild(btn);
            });

            // Check URL param for category prefilter
            const urlParams = new URLSearchParams(window.location.search);
            const catParam  = urlParams.get('category');
            if (catParam) {
                const btn = document.querySelector(`[data-cat="${catParam}"]`);
                if (btn) applyFilter(btn, catParam);
                else renderShop('all');
            } else {
                renderShop('all');
            }
        });

        function applyFilter(btn, cat) {
            document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderShop(cat);
        }

        function renderShop(categoryFilter) {
            let products = allProducts;
            if (categoryFilter !== 'all') {
                products = products.filter(p => p.category === categoryFilter);
            }

            document.getElementById('productCount').textContent = products.length;

            if (products.length === 0) {
                document.getElementById('productGrid').innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-box-open fa-3x text-muted mb-3 opacity-50"></i>
                        <h4 class="text-muted">No products in this category yet.</h4>
                    </div>`;
                return;
            }

            let html = '';
            products.forEach(p => {
                const imgSrc   = p.image || p.img || 'https://via.placeholder.com/400x500?text=No+Image';
                const badge    = p.stock === 0 ? `<span class="badge bg-danger">Out of Stock</span>` : (p.isNew ? `<span class="badge bg-success">New</span>` : '');
                const priceHtml = (p.originalPrice && p.originalPrice > p.price)
                    ? `<del class="text-muted small me-2">₹${p.originalPrice.toLocaleString()}</del><span class="text-primary fw-bold">₹${p.price.toLocaleString()}</span>`
                    : `<span class="text-primary fw-bold">₹${p.price.toLocaleString()}</span>`;

                html += `
                <div class="col-lg-3 col-md-4 col-sm-6">
                    <div class="product-card-shop card h-100">
                        <div class="position-relative">
                            <img src="${imgSrc}" alt="${p.name}">
                            <div class="position-absolute top-0 start-0 m-2">${badge}</div>
                        </div>
                        <div class="card-body text-center p-3">
                            <h6 class="fw-bold mb-1 text-truncate" title="${p.name}">${p.name}</h6>
                            <p class="text-muted small mb-2">${p.category.charAt(0).toUpperCase()+p.category.slice(1)}</p>
                            <div class="mb-3">${priceHtml}</div>
                            <div class="d-flex gap-2 justify-content-center">
                                <button class="btn btn-primary btn-sm px-3 ${p.stock===0?'disabled':''}"
                                    onclick="addToCart({id:'${p.id}',name:${JSON.stringify(p.name)},price:${p.price},img:'${imgSrc}',qty:1})">
                                    <i class="fas fa-cart-plus me-1"></i>Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('productGrid').innerHTML = html;
        }
    </script>
</body>
</html>
