<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Silk Sutra</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <!-- Header Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top py-3 bg-white shadow-sm border-bottom">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-dharmachakra text-secondary me-2"></i> Silk Sutra
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-bold">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="../shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" href="index.html">My Account</a></li>
                </ul>
                <div class="d-flex align-items-center fs-5">
                    <a href="../cart.html" class="text-primary position-relative">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-accent cart-count" style="font-size: 0.6rem;">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm sticky-top" style="top: 100px;">
                    <div class="card-body text-center p-4">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px;">
                            <i class="fas fa-user fa-2x"></i>
                        </div>
                        <h5 class="fw-bold" id="userNameDisplay">Loading...</h5>
                        <p class="text-muted small mb-0" id="userEmailDisplay">loading...</p>
                        
                        <hr class="my-4">
                        
                        <div class="d-flex flex-column text-start">
                            <a href="#" class="btn btn-light text-start mb-2 active"><i class="fas fa-box me-3"></i>My Orders</a>
                            <a href="#" class="btn btn-light text-start mb-2"><i class="fas fa-heart me-3"></i>Wishlist</a>
                            <a href="#" class="btn btn-light text-start mb-2"><i class="fas fa-map-marker-alt me-3"></i>Addresses</a>
                            <a href="#" class="btn btn-light text-start mb-2"><i class="fas fa-cog me-3"></i>Settings</a>
                            <button onclick="logout()" class="btn btn-outline-danger mt-3"><i class="fas fa-sign-out-alt me-2"></i>Sign Out</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <h3 class="fw-bold font-heading mb-0 text-primary">Recent Orders</h3>
                    <a href="../shop.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">Shop More</a>
                </div>
                
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <!-- Content loaded dynamically via js below based on user orders -->
                        <div id="userOrdersList" class="p-4 text-center">
                            <i class="fas fa-spinner fa-spin fa-2x text-primary mb-3"></i>
                            <p class="text-muted">Loading your orders...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('ss_currentUser'));
            
            // Check if user is logged in
            if (!currentUser) {
                window.location.href = 'login.html'; // Redirect to login
                return;
            }

            // Route Admin immediately
            if (currentUser.role === 'admin') {
                window.location.href = '../admin/index.html';
                return;
            }

            // Fill User Info
            document.getElementById('userNameDisplay').textContent = currentUser.name;
            document.getElementById('userEmailDisplay').textContent = currentUser.email;

            // Load user's recent orders (mock matching the log in email ideally)
            loadUserOrders(currentUser.email);
        });

        function loadUserOrders(email) {
            const orders = DB.getOrders().filter(o => o.contact && o.contact.toLowerCase() === email.toLowerCase());
            const listEl = document.getElementById('userOrdersList');
            
            if (orders.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-shopping-bag fa-3x text-muted opacity-50 mb-3"></i>
                        <h5 class="fw-bold">No Orders Yet</h5>
                        <p class="text-muted">Looks like you haven't made any purchases yet.</p>
                        <a href="../shop.html" class="btn btn-primary mt-2 rounded-pill px-4">Start Shopping</a>
                    </div>`;
                return;
            }

            let html = '';
            orders.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(o => {
                const orderDate = new Date(o.date).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
                
                let badgeClass = 'bg-secondary';
                if(o.status === 'Processing') badgeClass = 'bg-warning text-dark';
                else if(o.status === 'Shipped') badgeClass = 'bg-info bg-opacity-25 text-primary border border-primary';
                else if(o.status === 'Delivered') badgeClass = 'bg-success bg-opacity-25 text-success border border-success';

                html += `
                <div class="d-flex justify-content-between align-items-center border-bottom p-4">
                    <div>
                        <h6 class="fw-bold mb-1 font-heading"><a href="../order-tracking.html?id=${o.id}" class="text-decoration-none">${o.id}</a></h6>
                        <small class="text-muted mb-2 d-block"><i class="far fa-calendar-alt me-1"></i> Placed on ${orderDate}</small>
                        <div class="small fw-bold text-primary fs-6">₹${o.total.toLocaleString()}</div>
                    </div>
                    <div class="text-end">
                        <span class="badge ${badgeClass} mb-2 px-3 py-2 rounded-pill">${o.status}</span>
                        <div><a href="../order-tracking.html" class="btn btn-sm btn-outline-secondary rounded-pill px-3 shadow-sm"><i class="fas fa-truck me-1"></i>Track</a></div>
                    </div>
                </div>`;
            });
            listEl.innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('ss_currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
